<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var k = 'atsearch-theme'
          var s = localStorage.getItem(k)
          var dark =
            s === 'dark' ||
            (s !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.dataset.theme = dark ? 'dark' : 'light'
        } catch (e) {
          document.documentElement.dataset.theme = 'light'
        }
      })()
    </script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />

    <!-- Fonts: Hanken Grotesk (UI) + JetBrains Mono (technical strings) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <title>AT Search</title>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
